apiVersion: apps/v1
kind: Deployment
metadata:
  name: innovatech-backend-ventas
  labels:
    app: innovatech-ventas
spec:
  replicas: 2
  selector:
    matchLabels:
      app: innovatech-ventas
  template:
    metadata:
      labels:
        app: innovatech-ventas
    spec:
      containers:
        - name: innovatech-ventas
          image: tu-imagen-ventas-placeholder:latest
          imagePullPolicy: Always
          resources:
            requests:
              cpu: "100m"
              memory: "128Mi"
            limits:
              cpu: "500m"
              memory: "512Mi"
          ports:
            - containerPort: 8081
          env:
            - name: DB_NAME
              valueFrom:
                secretKeyRef:
                  name: innovatech-db-secrets
                  key: db-name
            - name: DB_USERNAME
              valueFrom:
                secretKeyRef:
                  name: innovatech-db-secrets
                  key: db-user
            - name: DB_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: innovatech-db-secrets
                  key: db-pass
            - name: DB_PORT
              value: "3306"
            - name: DATASOURCE_URL
              value: jdbc:mysql://mysql:3306/$(DB_NAME)?useSSL=false&allowPublicKeyRetrieval=true&serverTimezone=UTC
          livenessProbe:
            httpGet:
              path: /actuator/health/liveness
              port: 8081
            initialDelaySeconds: 40
            periodSeconds: 10
          readinessProbe:
            httpGet:
              path: /actuator/health/readiness
              port: 8081
            initialDelaySeconds: 45
            periodSeconds: 10
---
apiVersion: v1
kind: Service
metadata:
  name: innovatech-backend-ventas-svc
spec:
  selector:
    app: innovatech-ventas
  ports:
    - port: 8081
      targetPort: 8081
  type: ClusterIP