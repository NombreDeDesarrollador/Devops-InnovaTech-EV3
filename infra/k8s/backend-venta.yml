apiVersion: apps/v1
kind: Deployment
metadata:
  name: innovatech-ventas
spec:
  replicas: 2
  selector:
    matchLabels:
      app: innovatech-ventas
  template:
    metadata:
      labels:
        app: innovatech-ventas
    spec:
      initContainers:
        - name: wait-for-mysql
          image: busybox:1.36
          command:
            - sh
            - -c
            - |
              until nc -z mysql 3306; do
                echo "Esperando MySQL en puerto 3306...";
                sleep 5;
              done;
              echo "MySQL disponible. Iniciando Ventas."
      containers:
        - name: innovatech-ventas
          image: innovatech-ventas-image:latest
          imagePullPolicy: Always
          resources:
            requests:
              cpu: "200m"
              memory: "256Mi"
            limits:
              cpu: "500m"
              memory: "512Mi"
          ports:
            - containerPort: 8081
          env:
            - name: DB_NAME
              valueFrom:
                secretKeyRef:
                  name: innovatech-db-secrets
                  key: db-name
            - name: DB_USERNAME
              valueFrom:
                secretKeyRef:
                  name: innovatech-db-secrets
                  key: db-user
            - name: DB_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: innovatech-db-secrets
                  key: db-pass
            - name: DB_PORT
              value: "3306"
            - name: DATASOURCE_URL
              value: jdbc:mysql://mysql:3306/$(DB_NAME)?useSSL=false&allowPublicKeyRetrieval=true&serverTimezone=UTC
          livenessProbe:
            httpGet:
              path: /actuator/health/liveness
              port: 8081
            initialDelaySeconds: 90
            periodSeconds: 15
            timeoutSeconds: 5
            failureThreshold: 5
          readinessProbe:
            httpGet:
              path: /actuator/health/readiness
              port: 8081
            initialDelaySeconds: 90
            periodSeconds: 15
            timeoutSeconds: 5
            failureThreshold: 5
---
apiVersion: v1
kind: Service
metadata:
  name: innovatech-ventas-svc
spec:
  selector:
    app: innovatech-ventas
  ports:
    - port: 8081
      targetPort: 8081
  type: ClusterIP