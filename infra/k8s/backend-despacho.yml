apiVersion: apps/v1
kind: Deployment
metadata:
  name: innovatech-despachos
spec:
  replicas: 2
  selector:
    matchLabels:
      app: innovatech-despachos
  template:
    metadata:
      labels:
        app: innovatech-despachos
    spec:
      initContainers:
        - name: wait-for-mysql
          image: busybox:1.36
          command:
            - sh
            - -c
            - |
              until nc -z mysql 3306; do
                echo "Esperando MySQL en puerto 3306...";
                sleep 5;
              done;
              echo "MySQL disponible."
        - name: wait-for-ventas
          image: busybox:1.36
          command:
            - sh
            - -c
            - |
              echo "Esperando 30s para que Ventas termine de iniciar..."
              sleep 30
              until nc -z innovatech-ventas-svc 8081; do
                echo "Ventas aun no responde en puerto 8081, reintentando en 5s...";
                sleep 5;
              done;
              echo "Ventas disponible. Iniciando Despachos."
      containers:
        - name: innovatech-despachos
          image: innovatech-despachos-image:latest
          imagePullPolicy: Always
          resources:
            requests:
              cpu: "200m"
              memory: "256Mi"
            limits:
              cpu: "500m"
              memory: "512Mi"
          ports:
            - containerPort: 8082
          env:
            - name: DB_NAME
              valueFrom:
                secretKeyRef:
                  name: innovatech-db-secrets
                  key: db-name
            - name: DB_USERNAME
              valueFrom:
                secretKeyRef:
                  name: innovatech-db-secrets
                  key: db-user
            - name: DB_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: innovatech-db-secrets
                  key: db-pass
            - name: DB_PORT
              value: "3306"
            - name: DATASOURCE_URL
              value: jdbc:mysql://mysql:3306/$(DB_NAME)?useSSL=false&allowPublicKeyRetrieval=true&serverTimezone=UTC
            - name: VENTAS_API_URL
              value: http://innovatech-ventas-svc:8081
          livenessProbe:
            httpGet:
              path: /actuator/health/liveness
              port: 8082
            initialDelaySeconds: 90
            periodSeconds: 15
            timeoutSeconds: 5
            failureThreshold: 5
          readinessProbe:
            httpGet:
              path: /actuator/health/readiness
              port: 8082
            initialDelaySeconds: 90
            periodSeconds: 15
            timeoutSeconds: 5
            failureThreshold: 5
---
apiVersion: v1
kind: Service
metadata:
  name: innovatech-despachos-svc
spec:
  selector:
    app: innovatech-despachos
  ports:
    - port: 8082
      targetPort: 8082
  type: ClusterIP