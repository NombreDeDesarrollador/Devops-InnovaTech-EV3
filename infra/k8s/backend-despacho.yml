# ============================================================
# backend-despacho.yml — CORREGIDO PARA EKS (EV3)
# Cambios respecto a la versión anterior:
#   - imagePullPolicy: Always  (descarga desde ECR, no local)
#   - image: placeholder para ser reemplazado por el pipeline
#   - Credenciales DB leídas desde Secret (mysql-secret)
#   - Service cambiado a LoadBalancer para acceso interno vía ALB
#   - resources: requests/limits añadidos (requerido por HPA)
# ============================================================

apiVersion: apps/v1
kind: Deployment
metadata:
  name: backend-despacho
  labels:
    app: backend-despacho
spec:
  replicas: 2
  selector:
    matchLabels:
      app: backend-despacho
  template:
    metadata:
      labels:
        app: backend-despacho
    spec:
      containers:
        - name: backend-despacho
          # La imagen será actualizada dinámicamente por el pipeline CI/CD
          image: ACCOUNT_ID.dkr.ecr.us-east-1.amazonaws.com/devops-back-despachos:latest
          imagePullPolicy: Always
          ports:
            - containerPort: 8081
          env:
            - name: DB_HOST
              value: "mysql"
            - name: DB_PORT
              value: "3306"
            - name: DB_NAME
              valueFrom:
                secretKeyRef:
                  name: mysql-secret
                  key: DB_NAME
            - name: DB_USERNAME
              valueFrom:
                secretKeyRef:
                  name: mysql-secret
                  key: DB_USERNAME
            - name: DB_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: mysql-secret
                  key: DB_PASSWORD
          # Requerido para que el HPA pueda leer métricas de CPU/Memory
          resources:
            requests:
              cpu: "250m"
              memory: "256Mi"
            limits:
              cpu: "500m"
              memory: "512Mi"
          # Health checks para recuperación automática post-deploy
          livenessProbe:
            httpGet:
              path: /actuator/health/liveness
              port: 8081
            initialDelaySeconds: 60
            periodSeconds: 15
            failureThreshold: 3
          readinessProbe:
            httpGet:
              path: /actuator/health/readiness
              port: 8081
            initialDelaySeconds: 60
            periodSeconds: 10
            failureThreshold: 3
---
apiVersion: v1
kind: Service
metadata:
  name: backend-despacho
spec:
  type: ClusterIP
  selector:
    app: backend-despacho
  ports:
    - port: 8081
      targetPort: 8081