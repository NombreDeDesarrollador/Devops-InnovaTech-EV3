apiVersion: apps/v1
kind: Deployment
metadata:
  name: innovatech-backend-despachos
  labels:
    app: innovatech-despachos
spec:
  replicas: 2
  selector:
    matchLabels:
      app: innovatech-despachos
  template:
    metadata:
      labels:
        app: innovatech-despachos
    spec:
      initContainers:
        - name: wait-for-ventas
          image: busybox:1.36
          command:
            - sh
            - -c
            - |
              until nc -z innovatech-backend-ventas-svc 8081; do
                echo "Esperando a que el backend de ventas esté listo...";
                sleep 3;
              done;
      containers:
        - name: innovatech-despachos
          image: tu-imagen-despachos-placeholder:latest
          imagePullPolicy: Always
          resources:
            requests:
              cpu: "100m"
              memory: "128Mi"
            limits:
              cpu: "500m"
              memory: "512Mi"
          ports:
            - containerPort: 8082
          env:
            - name: DB_NAME
              valueFrom:
                secretKeyRef:
                  name: innovatech-db-secrets
                  key: db-name
            - name: DB_USERNAME
              valueFrom:
                secretKeyRef:
                  name: innovatech-db-secrets
                  key: db-user
            - name: DB_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: innovatech-db-secrets
                  key: db-pass
            - name: DB_PORT
              value: "3306"
            - name: DATASOURCE_URL
              value: jdbc:mysql://mysql:3306/$(DB_NAME)?useSSL=false&allowPublicKeyRetrieval=true&serverTimezone=UTC
            - name: VENTAS_API_URL
              value: http://innovatech-backend-ventas-svc:8081
          livenessProbe:
            httpGet:
              path: /actuator/health/liveness
              port: 8082
            initialDelaySeconds: 40
            periodSeconds: 10
          readinessProbe:
            httpGet:
              path: /actuator/health/readiness
              port: 8082
            initialDelaySeconds: 45
            periodSeconds: 10
---
apiVersion: v1
kind: Service
metadata:
  name: innovatech-backend-despachos-svc
spec:
  selector:
    app: innovatech-despachos
  ports:
    - port: 8082
      targetPort: 8082
  type: ClusterIP