name: CI - Build and Test (Ventas, Despachos, Frontend)

on:
  pull_request:
    branches:
      - main
  push:
    branches:
      - develop

jobs:
  test-backend-ventas:
    name: Test Spring Boot - Ventas
    runs-on: ubuntu-latest
    steps:
      - name: Checkout del repositorio
        uses: actions/checkout@v3

      - name: Configurar Java 17
        uses: actions/setup-java@v3
        with:
          java-version: '17'
          distribution: 'temurin'
          cache: maven

      - name: Compilar y ejecutar pruebas de Ventas
        working-directory: ./back-Ventas_SpringBoot/Springboot-API-REST
        run: ./mvnw clean test

  test-backend-despachos:
    name: Test Spring Boot - Despachos
    runs-on: ubuntu-latest
    steps:
      - name: Checkout del repositorio
        uses: actions/checkout@v3

      - name: Configurar Java 17
        uses: actions/setup-java@v3
        with:
          java-version: '17'
          distribution: 'temurin'
          cache: maven

      - name: Compilar y ejecutar pruebas de Despachos
        working-directory: ./back-Despachos_SpringBoot/Springboot-API-REST-DESPACHO
        run: ./mvnw clean test

  test-frontend:
    name: Build Frontend Vite
    runs-on: ubuntu-latest
    steps:
      - name: Checkout del repositorio
        uses: actions/checkout@v3

      - name: Configurar Node.js
        uses: actions/setup-node@v3
        with:
          node-version: '18'
          cache: 'npm'
          cache-dependency-path: ./front_despacho/package-lock.json

      - name: Instalar dependencias del Frontend
        working-directory: ./front_despacho
        run: npm ci

      - name: Verificar compilación del Frontend
        working-directory: ./front_despacho
        run: npm run build